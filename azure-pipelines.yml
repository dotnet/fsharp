# F# 15.9 servicing — official signed build pipeline
# Pattern B (Roslyn-style, no Arcade). Modeled on dotnet/roslyn release/dev15.9.x azure-pipelines-official.yml.
# See INTERNAL.md and plan.md (session workspace) for context.

trigger:
  branches:
    include:
      - release/dev15.9.x
pr: none

resources:
  repositories:
    - repository: MicroBuildTemplate
      type: git
      name: 1ESPipelineTemplates/MicroBuildTemplate
      ref: refs/tags/release

parameters:
  - name: SignType
    type: string
    default: real
    values:
      - real
      - test
  - name: SkipTests
    type: boolean
    default: true
  - name: PMEOverride
    type: boolean
    default: false

schedules:
  - cron: "0 8 22-28 * 0"
    displayName: "Monthly smoke test"
    branches:
      include:
        - release/dev15.9.x
    always: true
    batch: false

variables:
  # Variable groups: only those that pipeline 499 has authorized for F# CI.
  # Authorized list mirrors F# main / 16.11. Roslyn-only groups (DotNet-VSTS-Infra-Access,
  # AzureDevOps-Artifact-Feeds-Pats, DotNet-FSharp-Insertion-Variables) were dropped after
  # build 2968573 failed with "Variable group was not found or is not authorized for use."
  - group: DotNet-DevDiv-Insertion-Workflow-Variables
  - group: DotNet-Symbol-Server-Pats
  - group: DotNet-FSharp-SDLValidation-Params
  # _DevDivDropAccessToken / ArtifactServices.Drop.PAT both come from
  # dn-bot-devdiv-drop-rw-code-rw which lives in DotNet-DevDiv-Insertion-Workflow-Variables.
  - name: _DevDivDropAccessToken
    value: $(dn-bot-devdiv-drop-rw-code-rw)
  - name: ArtifactServices.Drop.PAT
    value: $(dn-bot-devdiv-drop-rw-code-rw)
  - name: BuildConfiguration
    value: release
  - name: BuildPlatform
    value: 'Any CPU'
  - name: TeamName
    value: FSharp
  - name: VisualStudio.DropName
    value: 'Products/$(System.TeamProject)/$(Build.Repository.Name)/$(Build.SourceBranchName)/$(Build.BuildNumber)'
  # Roslyn-style insertion control variables. The 1ES MicroBuildTemplate consumes these
  # to drive MicroBuildInsertVsPayload behavior. See plan B12 / E11.
  - name: Insertion.InsertToolset
    value: true
  - name: Insertion.CreateDraftPR
    value: true
  - name: Insertion.TitlePrefix
    value: "[Auto Insertion]"
  - name: Insertion.TitleSuffix
    value: ""
  - name: Codeql.Enabled
    value: true
  # CFS NuGet check tuning. Without these, the auto-injected
  # "Secure Supply Chain Analysis" step FAILS the build with
  # "MyGet feed declared" because dnceng's myget-legacy mirror URL contains
  # the substring "myget" — required for legacy F# 15.9 packages
  # (FSharp.Compiler.Tools 4.1.27, Roslyn 2.9, RoslynTools.SignTool 1.0.0-beta2,
  # MicroBuild.Plugins.SwixBuild 1.0.147, Microsoft.DotNet.BuildTools 1.0.27).
  # Pattern copied from dotnet/msbuild azure-pipelines (.vsts-dotnet-exp-perf.yml).
  - name: NugetSecurityAnalysisWarningLevel
    value: none
  - name: cfsNugetWarnLevel
    value: warn
  - name: nugetMultiFeedWarnLevel
    value: none

extends:
  template: azure-pipelines/MicroBuild.1ES.Official.yml@MicroBuildTemplate
  parameters:
    featureFlags:
      autoBaseline: true
    sdl:
      sourceAnalysisPool:
        name: NetCore1ESPool-Svc-Internal
        image: 1es-windows-2022
        os: windows
      sbom:
        enabled: false
      suppression:
        suppressionFile: $(Build.SourcesDirectory)\eng\config\guardian\.gdnsuppress
      policheck:
        enabled: true
      tsa:
        enabled: true
        configFile: $(Build.SourcesDirectory)/eng/TSAConfig.gdntsa
    pool:
      name: NetCore1ESPool-Svc-Internal
      image: windows.vs2017.amd64
      os: windows
    stages:
      - stage: build
        displayName: Build and Sign
        jobs:
          - job: OfficialBuild
            displayName: Official Build
            timeoutInMinutes: 360
            templateContext:
              outputParentDirectory: $(Build.ArtifactStagingDirectory)
              outputs:
                - output: pipelineArtifact
                  displayName: 'Publish Build Logs'
                  condition: succeededOrFailed()
                  targetPath: '$(Build.SourcesDirectory)\Release\net40\bin'
                  artifactName: ReleaseBuildLogs_Attempt$(System.JobAttempt)
                  artifactType: container
                  sbomEnabled: false
                - output: pipelineArtifact
                  displayName: Publish Symbols artifacts
                  condition: succeededOrFailed()
                  targetPath: $(Build.ArtifactStagingDirectory)\symbols
                  artifactName: ReleaseSymbols
                  artifactType: container
                  sbomEnabled: false
                - output: pipelineArtifact
                  displayName: Publish Insertion Parameters
                  targetPath: $(Build.ArtifactStagingDirectory)\Insertion
                  artifactName: InsertionParameters
                  artifactType: container
                  sbomEnabled: false
            steps:
              - task: PowerShell@2
                displayName: 'Pre-create artifact log dirs (1ES PT auto-publish expects them)'
                inputs:
                  targetType: 'inline'
                  script: |
                    New-Item -ItemType Directory -Path "$(Build.SourcesDirectory)\artifacts\log\Release" -Force | Out-Null
                    New-Item -ItemType Directory -Path "$(Build.SourcesDirectory)\artifacts\TestResults\Release" -Force | Out-Null
                    New-Item -ItemType Directory -Path "$(Build.ArtifactStagingDirectory)\artifacts\log\Release" -Force | Out-Null
                    Write-Host "Pre-created artifact directories so 1ES PT post-build publish steps don't fail"
              - task: NuGetToolInstaller@1
                displayName: 'Use NuGet 6.2.4'
                inputs:
                  versionSpec: 6.2.4
              - task: NuGetAuthenticate@1
                inputs:
                  nuGetServiceConnections: 'devdiv/dotnet-core-internal-tooling'
              - task: NuGetCommand@2
                inputs:
                  command: custom
                  arguments: 'locals all -clear'
              - task: UseDotNet@2
                displayName: 'Use modern .NET Core SDK (host only)'
                inputs:
                  packageType: sdk
                  useGlobalJson: true
                  workingDirectory: '$(Build.SourcesDirectory)'
              - task: MicroBuildSigningPlugin@4
                inputs:
                  signType: ${{ parameters.SignType }}
                  zipSources: false
                  feedSource: https://dnceng.pkgs.visualstudio.com/_packaging/MicroBuildToolset/nuget/v3/index.json
                  ${{ if or(eq(variables['Build.Reason'], 'IndividualCI'), eq(variables['Build.Reason'], 'Schedule'), parameters.PMEOverride) }}:
                    ConnectedPMEServiceName: 248d384a-b39b-46e3-8ad5-c2c210d5e7ca
                condition: and(succeeded(), in('${{ parameters.SignType }}', 'test', 'real'))
              - task: MicroBuildSwixPlugin@4
                inputs:
                  dropName: $(VisualStudio.DropName)
                  AccessToken: '$(System.AccessToken)'
                  feedSource: 'https://pkgs.dev.azure.com/dnceng/_packaging/MicroBuildToolset/nuget/v3/index.json'
              # The single canonical build invocation. F# 15.9's build.cmd microbuild mode
              # already orchestrates: init-tools (legacy SDK install) -> proto-fsc -> real fsc ->
              # FSharp.Core (multi-TFM via project.json + fsproj) -> vsintegration -> setup swixprojs ->
              # vsmanproj merge -> JSON-driven signing via build/scripts/run-signtool.cmd.
              # PB_SIGNTYPE / PB_SKIPTESTS env vars are how build.cmd reads pipeline intent.
              # PB_OfficialBuildId stamps versions.
              - script: build.cmd microbuild $(BuildConfiguration)
                displayName: 'build.cmd microbuild (proto -> real -> setup -> sign -> insertion)'
                env:
                  PB_SIGNTYPE: ${{ parameters.SignType }}
                  PB_SKIPTESTS: ${{ parameters.SkipTests }}
                  PB_OfficialBuildId: $(Build.BuildNumber)
              - task: PowerShell@2
                displayName: 'Mirror legacy log paths into artifacts/log/Release for 1ES PT post-build'
                condition: succeededOrFailed()
                inputs:
                  targetType: 'inline'
                  script: |
                    $cfg = "$(BuildConfiguration)"
                    $cfgDir = if ($cfg -ieq 'release') { "Release" } else { "Debug" }
                    $srcRoot = "$(Build.SourcesDirectory)"
                    $logSrc = Join-Path $srcRoot "$cfgDir"
                    $logDst = Join-Path $srcRoot "artifacts\log\Release"
                    $tstSrc = Join-Path $srcRoot "tests\TestResults"
                    $tstDst = Join-Path $srcRoot "artifacts\TestResults\Release"
                    New-Item -ItemType Directory -Path $logDst -Force | Out-Null
                    New-Item -ItemType Directory -Path $tstDst -Force | Out-Null
                    # mirror legacy build/binlogs into artifacts/log/Release so 1ES PT auto-publish finds something
                    if (Test-Path $logSrc) {
                      Get-ChildItem $logSrc -Recurse -Include "*.binlog","*.log","*.txt" -ErrorAction SilentlyContinue |
                        ForEach-Object {
                          $rel = $_.FullName.Substring($logSrc.Length).TrimStart('\','/')
                          $tgt = Join-Path $logDst $rel
                          New-Item -ItemType Directory -Path (Split-Path $tgt) -Force -ErrorAction SilentlyContinue | Out-Null
                          Copy-Item -Path $_.FullName -Destination $tgt -Force -ErrorAction SilentlyContinue
                        }
                    }
                    if (Test-Path $tstSrc) { Copy-Item -Path "$tstSrc\*" -Destination $tstDst -Recurse -Force -ErrorAction SilentlyContinue }
                    Write-Host "Mirrored logs/results from legacy F# 15.9 paths into artifacts/log+TestResults/Release"
              - task: PublishTestResults@2
                displayName: Publish NUnit Test Results
                inputs:
                  testRunner: NUnit
                  testResultsFiles: '**/tests/TestResults/**/*.xml'
                  mergeTestResults: true
                condition: and(succeededOrFailed(), eq('${{ parameters.SkipTests }}', 'false'))
              - task: CopyFiles@2
                displayName: 'Collect symbols'
                inputs:
                  SourceFolder: '$(Build.SourcesDirectory)\$(BuildConfiguration)'
                  Contents: '**\*.pdb'
                  TargetFolder: '$(Build.ArtifactStagingDirectory)\symbols'
                  FlattenFolders: true
                condition: succeeded()
              - task: PublishSymbols@2
                displayName: Publish symbols (TeamServices internal only)
                inputs:
                  SymbolsFolder: '$(Build.ArtifactStagingDirectory)\symbols'
                  SearchPattern: '**/*.pdb'
                  IndexSources: false
                  SymbolServerType: TeamServices
                condition: and(succeeded(), eq('${{ parameters.SignType }}', 'real'))
              - task: CopyFiles@2
                displayName: 'Collect insertion artifact'
                inputs:
                  SourceFolder: '$(Build.SourcesDirectory)\$(BuildConfiguration)\insertion'
                  Contents: '**\*'
                  TargetFolder: '$(Build.ArtifactStagingDirectory)\Insertion'
                condition: succeeded()
              # G4 fail-loud assertion (Constraint 4: zero nupkg leak)
              - powershell: |
                  $leaks = Get-ChildItem '$(Build.SourcesDirectory)\$(BuildConfiguration)' -Recurse -Filter '*.nupkg' -ErrorAction SilentlyContinue
                  if ($leaks) {
                    Write-Host "##vso[task.logissue type=error]nupkg leak detected (Constraint 4 violated):"
                    $leaks | ForEach-Object { Write-Host "##vso[task.logissue type=error]$($_.FullName)" }
                    exit 1
                  }
                  Write-Host "Nupkg leak check: zero .nupkg files in build output (OK)"
                displayName: 'Assert: zero nupkg leak (Constraint 4)'
              - task: 1ES.MicroBuildVstsDrop@1
                displayName: 'Upload insertion to VSTS Drop'
                inputs:
                  dropFolder: $(Build.ArtifactStagingDirectory)\Insertion
                  dropName: $(VisualStudio.DropName)
                  dropRetentionDays: 183
                  accessToken: $(_DevDivDropAccessToken)
                  skipUploadIfExists: true
                  dropServiceUri: 'https://devdiv.artifacts.visualstudio.com'
                  vsDropServiceUri: 'https://vsdrop.corp.microsoft.com/file/v1'
                condition: and(succeeded(), eq('${{ parameters.SignType }}', 'real'))