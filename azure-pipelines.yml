# F# 15.9 servicing pipeline 499 — 1ESPT-compliant stub.
#
# Block 8.0: rewrites the Block 1.5 vanilla-YAML stub into a pipeline that
# extends 1ESPipelineTemplates/MicroBuildTemplate, satisfying the dnceng
# 1ES Pipeline Template policy (https://aka.ms/1espt). The previous
# vanilla stub triggered "[1ES PT Error]: Organization breaks pipelines
# that do not extend one of the following templates - 1ESPT, OneBranchPT"
# on every push.
#
# This remains a NO-OP build. The full build/sign/insertion matrix lands
# in Block 9.x when eng/CIBuild.cmd is wired (RestorePlan section 9).
# The stub still completes "green" so pipeline 499 health is parseable
# and downstream WUs querying its status get a valid signal.

trigger:
  branches:
    include:
      - release/dev15.9.x
pr: none

variables:
  - name: _TeamName
    value: FSharp
  - name: TeamName
    value: FSharp
  - name: _BuildConfig
    value: Release
  - name: Codeql.Enabled
    value: 'false'

resources:
  repositories:
    - repository: MicroBuildTemplate
      type: git
      name: 1ESPipelineTemplates/MicroBuildTemplate
      ref: refs/tags/release

extends:
  template: azure-pipelines/MicroBuild.1ES.Official.yml@MicroBuildTemplate
  parameters:
    pool:
      name: NetCore1ESPool-Svc-Internal
      image: 1es-windows-2022
      os: windows
    sdl:
      sourceAnalysisPool:
        name: NetCore1ESPool-Svc-Internal
        image: 1es-windows-2022
        os: windows
    stages:
      - stage: Acknowledge
        displayName: 'Pipeline 499 trigger ack (1ESPT-compliant; full build matrix lands Block 9)'
        jobs:
          - job: noop
            displayName: 'No-op trigger ack'
            timeoutInMinutes: 10
            templateContext:
              outputs: []
            steps:
              - checkout: self
                fetchDepth: 1
              - powershell: |
                  Write-Host "F# 15.9 servicing pipeline 499 trigger acknowledged."
                  Write-Host "Branch: $(Build.SourceBranchName)"
                  Write-Host "Commit: $(Build.SourceVersion)"
                  Write-Host "1ES PT compliance: extends MicroBuild.1ES.Official.yml@MicroBuildTemplate"
                  Write-Host "Full build matrix replaces this stub in Block 9 (RestorePlan section 9)."
                  exit 0
                displayName: 'Emit ack message'