# F# 15.9 servicing — public PR validation pipeline
# Pattern B (Roslyn-style, no Arcade). Models the public-PR half of Roslyn 15.9.x.
# Build-only (no setup, no signing, no insertion). Skips swix to keep PR validation cheap.

trigger: none

pr:
  branches:
    include:
      - release/dev15.9.x
  paths:
    exclude:
      - INTERNAL.md
      - plan.md
      - '**/*.md'
      - .gitignore

resources:
  - repo: self

variables:
  - name: BuildPlatform
    value: 'Any CPU'
  - name: BuildConfiguration
    value: Debug
  - name: TeamName
    value: FSharp
  - name: PoolName
    value: NetCore-Public
  - name: Vs2017QueueName
    value: windows.vs2017.amd64.open

jobs:
  - job: BuildWindows
    displayName: 'PR build on Windows VS 2017 (compiler-only smoke)'
    timeoutInMinutes: 120
    pool:
      name: $(PoolName)
      demands: ImageOverride -equals $(Vs2017QueueName)
    steps:
      - task: NuGetToolInstaller@1
        displayName: 'Use NuGet 6.2.4'
        inputs:
          versionSpec: 6.2.4
      - task: NuGetAuthenticate@1
      - task: UseDotNet@2
        displayName: 'Use modern .NET Core SDK (host only)'
        inputs:
          packageType: sdk
          useGlobalJson: true
          workingDirectory: '$(Build.SourcesDirectory)'
      # PR validation runs the L1 smoke (compiler-only, no setup, no signing).
      # FSC_BUILD_SETUP=0 skips the Swix/setup pass to keep PRs fast.
      - script: build.cmd net40 $(BuildConfiguration)
        displayName: 'L1 smoke: build.cmd net40 (compiler only)'
        env:
          FSC_BUILD_SETUP: 0
      # Verify fsc.exe was built and prints help (G1 exit criterion #3)
      - powershell: |
          $fsc = Join-Path '$(Build.SourcesDirectory)' '$(BuildConfiguration)\net40\bin\fsc.exe'
          if (-not (Test-Path $fsc)) { throw "fsc.exe not produced at $fsc" }
          & $fsc --help | Select-Object -First 5
          Write-Host "G1 exit criterion #3 OK: fsc.exe built and prints help"
        displayName: 'G1 verify: fsc.exe smoke'
      - task: PublishBuildArtifacts@1
        displayName: 'Publish build logs (on failure)'
        inputs:
          PathtoPublish: '$(Build.SourcesDirectory)\$(BuildConfiguration)\net40\bin'
          ArtifactName: 'PR build logs'
          publishLocation: Container
        condition: failed()