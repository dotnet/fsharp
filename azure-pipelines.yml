# F# 15.9 servicing pipeline (definition 499): 1ES-PT official build.
# Extends MicroBuild.1ES.Official and runs eng\CIBuild.cmd on a Windows VS2022 image.
# Signing and VS insertion are added later in the insertion build.

trigger:
  branches:
    include:
      - release/dev15.9.x
pr: none

variables:
  - name: _TeamName
    value: FSharp
  - name: TeamName
    value: FSharp
  - name: _BuildConfig
    value: Release
  - name: Codeql.Enabled
    value: 'false'
  # Signing replicates dotnet/fsharp main's official signed build: real ESRP signing via the 1ES mb.signing
  # block + the DotNet-DevDiv-Insertion-Workflow-Variables group (already authorized for this repo) +
  # OfficialBuildId (so Arcade applies real signatures instead of dry-running).
  - name: _SignType
    value: Real

resources:
  repositories:
    - repository: MicroBuildTemplate
      type: git
      name: 1ESPipelineTemplates/MicroBuildTemplate
      ref: refs/tags/release

extends:
  template: azure-pipelines/MicroBuild.1ES.Official.yml@MicroBuildTemplate
  parameters:
    pool:
      name: NetCore1ESPool-Svc-Internal
      image: 1es-windows-2022
      os: windows
    sdl:
      sourceAnalysisPool:
        name: NetCore1ESPool-Svc-Internal
        image: 1es-windows-2022
        os: windows
    stages:
      - stage: Build
        displayName: 'F# 15.9 Build (Windows Release)'
        jobs:
          - job: BuildWindows
            displayName: 'Build Windows Release'
            timeoutInMinutes: 120
            variables:
              - group: DotNet-DevDiv-Insertion-Workflow-Variables
            pool:
              name: NetCore1ESPool-Svc-Internal
              image: windows.vs2022.amd64
              os: windows
            templateContext:
              mb:
                signing:
                  enabled: true
                  signWithProd: true
                  feedSource: https://dnceng.pkgs.visualstudio.com/_packaging/MicroBuildToolset/nuget/v3/index.json
                  signType: $(_SignType)
                  zipSources: false
              outputs:
                - output: pipelineArtifact
                  displayName: 'Publish binary log'
                  condition: always()
                  targetPath: '$(Build.SourcesDirectory)/artifacts/log/$(_BuildConfig)'
                  artifactName: 'BuildLogs'
                  sbomEnabled: false
                - output: pipelineArtifact
                  displayName: 'Publish product drop'
                  condition: succeeded()
                  targetPath: '$(Build.SourcesDirectory)/release/net40/bin'
                  artifactName: 'Product_net40'
                  sbomEnabled: false
                - output: pipelineArtifact
                  displayName: 'Publish insertion VSIX'
                  condition: succeeded()
                  targetPath: '$(Build.SourcesDirectory)/vsintegration/Vsix/VisualFSharpFull/bin/Release'
                  artifactName: 'VSIX'
                  sbomEnabled: false
            steps:
              - checkout: self
                clean: true
                fetchDepth: 1
              # Authenticate the devdiv 'DevDiv - VS package feed' service connection so the insertion build
              # can restore the serviced VS-2017 Roslyn from devdiv VS-CoreXtFeeds via a build-time --source
              # (the committed NuGet.Config stays clean). CIBuild.cmd Step 5 does the devdiv restore.
              - task: NuGetAuthenticate@1
                displayName: 'Authenticate NuGet feeds (incl. devdiv VS package feed)'
                inputs:
                  nuGetServiceConnections: 'DevDiv - VS package feed'
              - script: eng\CIBuild.cmd -configuration $(_BuildConfig)
                displayName: 'Build (product) + tests + insertion VSIX + sign'
                env:
                  DisableLocalization: true
                  BUILD_INSERTION: 1
                  SignType: $(_SignType)
                  OfficialBuildId: $(Build.BuildNumber)
              - task: PublishTestResults@2
                displayName: 'Publish test results'
                condition: always()
                inputs:
                  testResultsFormat: 'NUnit'
                  testResultsFiles: '$(Build.SourcesDirectory)/artifacts/TestResults/*.xml'
                  failTaskOnFailedTests: true
