# F# 15.9 servicing pipeline (definition 499): 1ES-PT official build.
# Extends MicroBuild.1ES.Official and runs eng\CIBuild.cmd on a Windows VS2022 image.
# Signing and VS insertion are added later in the insertion build.

trigger:
  branches:
    include:
      - release/dev15.9.x
pr: none

variables:
  - name: _TeamName
    value: FSharp
  - name: TeamName
    value: FSharp
  - name: _BuildConfig
    value: Release
  - name: Codeql.Enabled
    value: 'false'

resources:
  repositories:
    - repository: MicroBuildTemplate
      type: git
      name: 1ESPipelineTemplates/MicroBuildTemplate
      ref: refs/tags/release

extends:
  template: azure-pipelines/MicroBuild.1ES.Official.yml@MicroBuildTemplate
  parameters:
    pool:
      name: NetCore1ESPool-Svc-Internal
      image: 1es-windows-2022
      os: windows
    sdl:
      sourceAnalysisPool:
        name: NetCore1ESPool-Svc-Internal
        image: 1es-windows-2022
        os: windows
    stages:
      - stage: Build
        displayName: 'F# 15.9 Build (Windows Release)'
        jobs:
          - job: BuildWindows
            displayName: 'Build Windows Release'
            timeoutInMinutes: 120
            pool:
              name: NetCore1ESPool-Svc-Internal
              image: windows.vs2022.amd64
              os: windows
            templateContext:
              outputs:
                - output: pipelineArtifact
                  displayName: 'Publish binary log'
                  condition: always()
                  targetPath: '$(Build.SourcesDirectory)/artifacts/log/$(_BuildConfig)'
                  artifactName: 'BuildLogs'
                  sbomEnabled: false
            steps:
              - checkout: self
                clean: true
                fetchDepth: 1
              # STAGED insertion build: the "DevDiv - VS package feed" service connection is now authorized
              # for this pipeline, but CFS still rejects a direct devdiv feed in NuGet.Config. To enable the
              # insertion build, point NuGet.Config at a dnceng Azure Artifacts feed that UPSTREAMS devdiv
              # VS-CoreXtFeeds (CFS requires a single feed via upstreams), then add to this step:
              #   inputs: { nuGetServiceConnections: 'DevDiv - VS package feed' }   and   env BUILD_INSERTION: 1
              - task: NuGetAuthenticate@1
                displayName: 'Authenticate NuGet feeds'
              - script: eng\CIBuild.cmd -configuration $(_BuildConfig)
                displayName: 'Build (product) + tests'
                env:
                  DisableLocalization: true
              - task: PublishTestResults@2
                displayName: 'Publish test results'
                condition: always()
                inputs:
                  testResultsFormat: 'NUnit'
                  testResultsFiles: '$(Build.SourcesDirectory)/artifacts/TestResults/*.xml'
                  failTaskOnFailedTests: true
