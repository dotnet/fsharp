# F# 15.9 servicing pipeline 499 — 1ESPT-compliant build.
#
# Block 8.0: extends 1ESPipelineTemplates/MicroBuildTemplate (1ES PT policy).
# Block 8.1: CFS feed compliance (dotnet-public only; no MyGet/nuget.org).
# Block 9a: replaces the no-op ack stage with a REAL product build stage that
#   runs eng\CIBuild.cmd (Arcade engine, restore + build) on a 1ES VS image.
#   This validates that the 15.9 product (FSharp.Core, compiler, FSharp.Build,
#   vsintegration) builds end-to-end on CI after the Block 5.x restore/build
#   fixes. Signing / packing / publishing / VS insertion deliberately remain
#   OFF and land in subsequent Block 9 increments once the build is proven
#   green — keeping each slow CI iteration single-variable.
#
# Build/sign/insert logic is modeled on dev16.11 @ 874517c0e (Kevin Ransom's
# 2025-05 proven-green F# servicing revival) re-wrapped in main's current
# 1ESPT skeleton, because dev16.11's own YAML predates the mandatory 1ES PT
# template.

trigger:
  branches:
    include:
      - release/dev15.9.x
pr: none

variables:
  - name: _TeamName
    value: FSharp
  - name: TeamName
    value: FSharp
  - name: _BuildConfig
    value: Release
  - name: Codeql.Enabled
    value: 'false'

resources:
  repositories:
    - repository: MicroBuildTemplate
      type: git
      name: 1ESPipelineTemplates/MicroBuildTemplate
      ref: refs/tags/release

extends:
  template: azure-pipelines/MicroBuild.1ES.Official.yml@MicroBuildTemplate
  parameters:
    pool:
      name: NetCore1ESPool-Svc-Internal
      image: 1es-windows-2022
      os: windows
    sdl:
      sourceAnalysisPool:
        name: NetCore1ESPool-Svc-Internal
        image: 1es-windows-2022
        os: windows
    stages:
      - stage: Build
        displayName: 'F# 15.9 Build (Windows Release)'
        jobs:
          - job: BuildWindows
            displayName: 'Build Windows Release'
            timeoutInMinutes: 120
            pool:
              name: NetCore1ESPool-Svc-Internal
              image: windows.vs2022preview.amd64
              os: windows
            templateContext:
              outputs:
                - output: pipelineArtifact
                  displayName: 'Publish binary log'
                  condition: always()
                  targetPath: '$(Build.SourcesDirectory)/artifacts/log/$(_BuildConfig)'
                  artifactName: 'BuildLogs'
                  sbomEnabled: false
            steps:
              - checkout: self
                clean: true
                fetchDepth: 1
              - script: eng\CIBuild.cmd -configuration $(_BuildConfig)
                displayName: 'Build (restore + build, no sign/pack/insert)'
                env:
                  DisableLocalization: true