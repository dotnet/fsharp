# F# 15.9 servicing pipeline (definition 499): 1ES-PT official build.
# Extends MicroBuild.1ES.Official and runs eng\CIBuild.cmd on a Windows VS2022 image.
# Signing and VS insertion are added later in the insertion build.

trigger:
  branches:
    include:
      - release/dev15.9.x
pr: none

variables:
  - name: _TeamName
    value: FSharp
  - name: TeamName
    value: FSharp
  - name: _BuildConfig
    value: Release
  - name: Codeql.Enabled
    value: 'false'
  # Signing replicates dotnet/fsharp main's official signed build: real ESRP signing via the 1ES mb.signing
  # block + the DotNet-DevDiv-Insertion-Workflow-Variables group (already authorized for this repo) +
  # OfficialBuildId (so Arcade applies real signatures instead of dry-running).
  - name: _SignType
    value: Real
  # The insertion + signed VSIX require access to the devdiv 'VS' feed (serviced VS-2017 Roslyn 2.10) through a
  # service connection. The original 'DevDiv - VS package feed' connection was removed by the org PAT-disable
  # policy migration (cf. PR #20036), which invalidated this pipeline's YAML. Set this variable to the
  # replacement connection name to re-enable the insertion + signing; left empty, the pipeline builds product +
  # tests only, which keeps the YAML valid and the build green.
  - name: _DevDivServiceConnection
    value: ''

resources:
  repositories:
    - repository: MicroBuildTemplate
      type: git
      name: 1ESPipelineTemplates/MicroBuildTemplate
      ref: refs/tags/release

extends:
  template: azure-pipelines/MicroBuild.1ES.Official.yml@MicroBuildTemplate
  parameters:
    pool:
      name: NetCore1ESPool-Svc-Internal
      image: 1es-windows-2022
      os: windows
    sdl:
      sourceAnalysisPool:
        name: NetCore1ESPool-Svc-Internal
        image: 1es-windows-2022
        os: windows
    stages:
      - stage: Build
        displayName: 'F# 15.9 Build (Windows Release)'
        jobs:
          - job: BuildWindows
            displayName: 'Build Windows Release'
            timeoutInMinutes: 120
            variables:
              - ${{ if ne(variables._DevDivServiceConnection, '') }}:
                - group: DotNet-DevDiv-Insertion-Workflow-Variables
            pool:
              name: NetCore1ESPool-Svc-Internal
              image: windows.vs2022.amd64
              os: windows
            templateContext:
              ${{ if ne(variables._DevDivServiceConnection, '') }}:
                mb:
                  signing:
                    enabled: true
                    signWithProd: true
                    feedSource: https://dnceng.pkgs.visualstudio.com/_packaging/MicroBuildToolset/nuget/v3/index.json
                    signType: $(_SignType)
                    zipSources: false
              outputs:
                - output: pipelineArtifact
                  displayName: 'Publish binary log'
                  condition: always()
                  targetPath: '$(Build.SourcesDirectory)/artifacts/log/$(_BuildConfig)'
                  artifactName: 'BuildLogs'
                  sbomEnabled: false
                - output: pipelineArtifact
                  displayName: 'Publish product drop'
                  condition: succeeded()
                  targetPath: '$(Build.SourcesDirectory)/release/net40/bin'
                  artifactName: 'Product_net40'
                  sbomEnabled: false
                - ${{ if ne(variables._DevDivServiceConnection, '') }}:
                  - output: pipelineArtifact
                    displayName: 'Publish insertion VSIX'
                    condition: succeeded()
                    targetPath: '$(Build.SourcesDirectory)/vsintegration/Vsix/VisualFSharpFull/bin/Release'
                    artifactName: 'VSIX'
                    sbomEnabled: false
            steps:
              - checkout: self
                clean: true
                fetchDepth: 1
              # Authenticate the devdiv 'VS' feed service connection (name in _DevDivServiceConnection) so the
              # insertion build can restore the serviced VS-2017 Roslyn 2.10. Only emitted when the variable is
              # set - otherwise this pipeline builds product + tests only. NOTE: if the replacement connection is
              # a WIF connection, switch this to `azureDevOpsServiceConnection: <name>` + `feedUrl:` (cf. PR #20036).
              - ${{ if ne(variables._DevDivServiceConnection, '') }}:
                - task: NuGetAuthenticate@1
                  displayName: 'Authenticate NuGet feeds (incl. devdiv VS feed)'
                  inputs:
                    nuGetServiceConnections: ${{ variables._DevDivServiceConnection }}
              - script: eng\CIBuild.cmd -configuration $(_BuildConfig)
                displayName: 'Build (product) + tests (+ insertion VSIX + sign when devdiv SC set)'
                env:
                  DisableLocalization: true
                  ${{ if ne(variables._DevDivServiceConnection, '') }}:
                    BUILD_INSERTION: 1
                    SignType: $(_SignType)
                    OfficialBuildId: $(Build.BuildNumber)
              - task: PublishTestResults@2
                displayName: 'Publish test results'
                condition: always()
                inputs:
                  testResultsFormat: 'NUnit'
                  testResultsFiles: '$(Build.SourcesDirectory)/artifacts/TestResults/*.xml'
                  failTaskOnFailedTests: true
